<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - Mabalane Aphane</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="document.body.style.opacity='1'">
<div class="hero">
    <div class="nav">
        <div class="logo">
            <h2>Mabalane Aphane</h2>
        </div>
        <div class="link">
            <ul>
                <li><a href="index.html" id="homeLink">Home</a></li>
                <li><a href="about.html" id="aboutLink">About</a></li>
                <li><a href="#">Projects</a></li>
                <li><a href="#" id="contactLink">Contact</a></li>
            </ul>
        </div>
    </div>
    <div class="main" id="contactSection">
        <div class="content">
            <h1>Contact Me</h1>
            <p>If you have any inquiries or would like to get in touch, please feel free to contact me using the form below:</p>
            <form action="#" method="post" class="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>
    <div class="contact-info">
        <p>Email: Phumimabalane@gmail.com</p>
        <p>Contact Number: +2767 754 0777</p>
    </div>
</div>
</body>
</html>
